# Admin API service configuration (example)
server:
  host: 0.0.0.0
  port: 8080
  cors:
    enabled: true
    origins:
      - "*"
security:
  jwtSecret: "change-me-in-production"
  mfaEnabled: false
logging:
  level: info
  format: json
  output: file
  file: 
    path: "var/log/laojun/laojun.log"
database:
  postgres:
    host: localhost
    port: 5432
    user: laojun
    password: "change-me"
    dbname: laojun
    sslmode: disable
  redis:
    host: localhost
    port: 6379
    db: 0
    password: ""
  influxdb:
    url: "http://localhost:8086"
    token: ""
    org: "default"
    bucket: "metrics"
objectStorage:
  minio:
    endpoint: "http://localhost:9000"
    accessKey: "minioadmin"
    secretKey: "minioadmin"
    bucket: "laojun"
# 插件路径说明：运行态数据在 var/lib/laojun/plugins/*
# 分发归档与模板位于 usr/share/laojun/plugins/
# 请勿将分发包放入运行态目录
plugins:
  installPath: "var/lib/laojun/plugins/installed"
  cachePath: "var/lib/laojun/plugins/cache"
  statePath: "var/lib/laojun/plugins/state"
  allowHotSwap: true