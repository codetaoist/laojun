version: '3.8'

services:
  # 配置中心
  config-center:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: config-center
    ports:
      - "8090:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GIN_MODE=release
    depends_on:
      - postgres
      - redis
    volumes:
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
    networks:
      - laojun-network
    restart: unless-stopped

  # Admin API
  admin-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: admin-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CONFIG_CENTER_URL=http://config-center:8090
      - GIN_MODE=release
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
    depends_on:
      - postgres
      - redis
      - config-center
    volumes:
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    networks:
      - laojun-network
    restart: unless-stopped

  # Marketplace API
  marketplace-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: marketplace-api
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - CONFIG_CENTER_URL=http://config-center:8090
      - GIN_MODE=release
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
    depends_on:
      - postgres
      - redis
      - config-center
    volumes:
      - ../configs:/app/configs:ro
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    networks:
      - laojun-network
    restart: unless-stopped

  # Admin Web Frontend
  admin-web:
    build:
      context: ../web/admin
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=https://admin-api.your-domain.com
    networks:
      - laojun-network
    restart: unless-stopped

  # Marketplace Web Frontend
  marketplace-web:
    build:
      context: ../web/marketplace
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - VITE_API_URL=https://marketplace-api.your-domain.com
    networks:
      - laojun-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - laojun-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laojun-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - admin-web
      - marketplace-web
      - admin-api
      - marketplace-api
    networks:
      - laojun-network
    restart: unless-stopped

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - laojun-network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - laojun-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  laojun-network:
    driver: bridge