version: '3.8'

services:
  admin-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: admin-api
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - CONFIG_CENTER_URL=http://config-center:8081
    depends_on:
      - postgres
      - redis
      - config-center
    volumes:
      - ../configs:/app/configs:ro
    networks:
      - laojun-network

  config-center:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: config-center
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    volumes:
      - ../configs:/app/configs:ro
    networks:
      - laojun-network

  marketplace-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: marketplace-api
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - CONFIG_CENTER_URL=http://config-center:8081
      - PORT=8082
    depends_on:
      - postgres
      - redis
      - config-center
    volumes:
      - ../configs:/app/configs:ro
    networks:
      - laojun-network

  admin-web:
    build:
      context: ../web/admin
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
    networks:
      - laojun-network

  marketplace-web:
    build:
      context: ../web/marketplace
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8082
    networks:
      - laojun-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: laojun
      POSTGRES_USER: laojun
      POSTGRES_PASSWORD: laojun123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - laojun-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - laojun-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus-test.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - laojun-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - laojun-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  laojun-network:
    driver: bridge