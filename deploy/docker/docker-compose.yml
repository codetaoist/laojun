version: '3.8'

# 新的Docker部署架构
# 特点：
# 1. 服务分离，每个服务独立容器
# 2. 插件市场为默认首页（80端口）
# 3. 管理后台通过8080端口访问
# 4. 统一的环境变量管理
# 5. 简化的网络配置

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: laojun-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laojun}
      POSTGRES_USER: ${POSTGRES_USER:-laojun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laojun123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laojun} -d ${POSTGRES_DB:-laojun}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: laojun-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # 配置中心服务
  config-center:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.config-center
    container_name: laojun-config-center
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-laojun}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-laojun123}
      - DB_NAME=${POSTGRES_DB:-laojun}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - CONFIG_CENTER_PORT=8081
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      
      # 安全配置
      - SECURITY_ENABLE_CAPTCHA=${SECURITY_ENABLE_CAPTCHA:-false}
      - SECURITY_CAPTCHA_TTL=${SECURITY_CAPTCHA_TTL:-2m}
      
      # 运行模式
      - GIN_MODE=release
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../logs:/app/logs
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 管理API服务
  admin-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.admin-api
    container_name: laojun-admin-api
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-laojun}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-laojun123}
      - DB_NAME=${POSTGRES_DB:-laojun}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      
      # 安全配置
      - SECURITY_ENABLE_CAPTCHA=${SECURITY_ENABLE_CAPTCHA:-false}
      - SECURITY_CAPTCHA_TTL=${SECURITY_CAPTCHA_TTL:-2m}
      
      # CORS 配置
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      
      # 运行模式
      - GIN_MODE=release
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-center:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../logs:/app/logs
      - ../../uploads:/app/uploads
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # 插件市场API服务
  marketplace-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.marketplace-api
    container_name: laojun-marketplace-api
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-laojun}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-laojun123}
      - DB_NAME=${POSTGRES_DB:-laojun}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_PORT=8082
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      
      # 安全配置
      - SECURITY_ENABLE_CAPTCHA=${SECURITY_ENABLE_CAPTCHA:-false}
      - SECURITY_CAPTCHA_TTL=${SECURITY_CAPTCHA_TTL:-2m}
      
      # CORS 配置
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      
      # 运行模式
      - GIN_MODE=release
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      config-center:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../logs:/app/logs
      - ../../uploads:/app/uploads
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx 反向代理 + 前端静态文件服务
  nginx:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.nginx
    container_name: laojun-nginx
    ports:
      - "80:80"      # 插件市场（默认首页）
      - "8888:8888"  # 管理后台
    depends_on:
      admin-api:
        condition: service_healthy
      marketplace-api:
        condition: service_healthy
    volumes:
      - ../../logs/nginx:/var/log/nginx
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  laojun-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16