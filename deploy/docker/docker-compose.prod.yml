version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: laojun-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laojun}
      POSTGRES_USER: ${POSTGRES_USER:-laojun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laojun123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db/migrations:/docker-entrypoint-initdb.d
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laojun} -d ${POSTGRES_DB:-laojun}"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: laojun-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    volumes:
      - redis_data:/data
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # 主应用服务 (包含所有后端服务和前端)
  laojun-app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.prod
    container_name: laojun-app-prod
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Admin API
      - "8081:8081"   # Config Center
      - "8082:8082"   # Marketplace API
    environment:
      # 数据库配置
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-laojun}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-laojun123}
      - DB_NAME=${POSTGRES_DB:-laojun}
      
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      
      # 应用配置
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_PORT=${APP_PORT:-80}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      
      # JWT 配置
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      
      # CORS 配置
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
      
      # 域名配置
      - DOMAIN=${DOMAIN:-localhost}
      
      # SSL 配置 (可选)
      - SSL_ENABLED=${SSL_ENABLED:-false}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-/etc/ssl/certs/cert.pem}
      - SSL_KEY_PATH=${SSL_KEY_PATH:-/etc/ssl/private/key.pem}
      
      # 运行模式
      - GIN_MODE=release
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../configs:/app/configs:ro
      - ../../logs:/app/logs
      - ../../uploads:/app/uploads
      - app_data:/app/data
      # SSL 证书 (可选)
      # - ./ssl:/etc/ssl:ro
    networks:
      - laojun-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # PostgreSQL 监控
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: laojun-postgres-exporter-prod
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-laojun}:${POSTGRES_PASSWORD:-laojun123}@postgres:5432/${POSTGRES_DB:-laojun}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - laojun-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # Redis 监控
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: laojun-redis-exporter-prod
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-redis123}"
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - laojun-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local

networks:
  laojun-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16