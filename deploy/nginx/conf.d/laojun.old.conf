# 主站点配置 - 替换 your-domain.com 为您的实际域名
server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 your-domain.com www.your-domain.com _;
    
    # 重定向到 HTTPS (如果使用 SSL)
    # return 301 https://$server_name$request_uri;
    
    # 如果不使用 SSL，可以直接配置以下内容
    root /app/web;
    index index.html;

    # 安全配置
    server_tokens off;
    
    # 管理后台已移至独立端口 8081 (见 admin-separate.conf)
    
    # 市场前端 - 根路径
    location / {
        root /app/web/marketplace;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API 路由
    # 管理 API
    location /api/admin/ {
        proxy_pass http://admin_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # 配置中心 API
    location /api/config/ {
        proxy_pass http://config_center/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # 市场 API
    location /api/marketplace/ {
        proxy_pass http://marketplace_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 统一 API 前缀（市场）
    location /api/v1/ {
        proxy_pass http://marketplace_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
    }
    
    location ~ \.(env|log|conf)$ {
        deny all;
    }
}

